<div class="card mb-4">
    <div class="card-header d-flex justify-content-between">
      <h5>Skill Section</h5>
      <button class="btn btn-primary btn-sm" (click)="openAddSkill()">+ Add Skill</button>
    </div>

    <div class="card-body">
      <table class="table table-hover">
        <thead>
          <tr>
            <th>Skill</th>
            <th>Level</th>
            <th>Proficiency</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let skill of paginatedSkills$ | async">
            <td>{{ skill.name }}</td>
            <td>
              <div class="progress">
                <div class="progress-bar" [style.width.%]="skill.level">
                  {{ skill.level }}%
                </div>
              </div>
            </td>
            <td>✔ {{ skill.proficiency }}%</td>
            <td>
              <button class="btn btn-sm btn-outline-primary" (click)="edit(skill)">Edit</button>
              <button class="btn btn-sm btn-outline-danger" (click)="openDeleteModal(skill.id)">Delete</button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
<nav class="d-flex justify-content-end">
  <ul class="pagination pagination-sm">

    <!-- Previous -->
    <li class="page-item"
        [class.disabled]="(currentPage$ | async) === 1">
      <button class="page-link"
              (click)="prevPage()">
        Previous
      </button>
    </li>

    <!-- Page numbers -->
    <li class="page-item"
        *ngFor="let page of [].constructor(totalPagesCount); let i = index"
        [class.active]="(currentPage$ | async) === i + 1">
      <button class="page-link"
              (click)="changePage(i + 1)">
        {{ i + 1 }}
      </button>
    </li>

    <!-- Next -->
    <li class="page-item"
        [class.disabled]="(currentPage$ | async) === totalPagesCount">
      <button class="page-link"
              (click)="nextPage()">
        Next
      </button>
    </li>

  </ul>
</nav>


<app-skill-form
  [open]="showAddModal"
  (close)="closeAddSkill()"
  (save)="onSkillSave($event)"
  (update)="onSkillUpdate($event)">
</app-skill-form>


<!--delete Modal -->
<!-- Modal -->
<div class="modal fade show"
     tabindex="-1"
     style="display: block;"
     *ngIf="showModal">

  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Confirm Delete</h5>
        <button type="button"
                class="btn-close"
                (click)="closeModal()">
        </button>
      </div>

      <div class="modal-body text-center">
        Are you sure you want to delete this skill?
      </div>

      <div class="modal-footer justify-content-center">
        <button class="btn btn-secondary"
                (click)="closeModal()">
          No
        </button>
        <button class="btn btn-danger"
                (click)="confirmDelete()">
          Yes
        </button>
      </div>

    </div>
  </div>
</div>

<!-- Backdrop -->
<div class="modal-backdrop fade show"
     *ngIf="showModal">
</div>
